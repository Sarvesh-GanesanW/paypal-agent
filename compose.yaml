services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: datazoic-paypal-pgvector
    environment:
      POSTGRES_DB: paypal_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - paypal_pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d paypal_agent"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  paypal_pgvector_data:
